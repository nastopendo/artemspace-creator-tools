<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="textToPngTitle">Text to PNG</title>
    <link rel="stylesheet" href="../../style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Aptos";
        font-weight: 300;
        font-style: normal;
        src: local("Aptos Light");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 400;
        font-style: normal;
        src: local("Aptos");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 600;
        font-style: normal;
        src: local("Aptos SemiBold");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 700;
        font-style: normal;
        src: local("Aptos Bold");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 800;
        font-style: normal;
        src: local("Aptos ExtraBold");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 300;
        font-style: italic;
        src: local("Aptos Light Italic");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 400;
        font-style: italic;
        src: local("Aptos Italic");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 600;
        font-style: italic;
        src: local("Aptos SemiBold Italic");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 700;
        font-style: italic;
        src: local("Aptos Bold Italic");
      }
      @font-face {
        font-family: "Aptos";
        font-weight: 800;
        font-style: italic;
        src: local("Aptos ExtraBold Italic");
      }

      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 300;
        font-style: normal;
        src: local("Aptos Narrow Light");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 400;
        font-style: normal;
        src: local("Aptos Narrow");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 600;
        font-style: normal;
        src: local("Aptos Narrow SemiBold");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 700;
        font-style: normal;
        src: local("Aptos Narrow Bold");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 800;
        font-style: normal;
        src: local("Aptos Narrow ExtraBold");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 300;
        font-style: italic;
        src: local("Aptos Narrow Light Italic");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 400;
        font-style: italic;
        src: local("Aptos Narrow Italic");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 600;
        font-style: italic;
        src: local("Aptos Narrow SemiBold Italic");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 700;
        font-style: italic;
        src: local("Aptos Narrow Bold Italic");
      }
      @font-face {
        font-family: "Aptos Narrow";
        font-weight: 800;
        font-style: italic;
        src: local("Aptos Narrow ExtraBold Italic");
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-800 min-h-screen py-8 px-4">
    <header>
      <nav>
        <a
          href="/"
          data-link
          class="text-blue-600 hover:text-blue-800"
          data-i18n="backToTools"
          >← Back to Tools</a
        >
      </nav>
    </header>

    <div class="max-w-6xl mx-auto animate-fade-in">
      <h1
        class="text-3xl font-bold text-center text-gray-800 mb-8"
        data-i18n="textToPngTitle"
      >
        Text to PNG
      </h1>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Left panel: Controls -->
        <div class="bg-white rounded-lg shadow-md p-6 space-y-4">
          <!-- Canvas size -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block font-semibold text-gray-700 mb-1 text-sm"
                data-i18n="textToPngWidth"
                >Width</label
              >
              <select
                id="canvasWidth"
                class="w-full p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm"
              >
                <option value="64">64</option>
                <option value="128">128</option>
                <option value="256">256</option>
                <option value="512">512</option>
                <option value="1024">1024</option>
                <option value="2048" selected>2048</option>
                <option value="4096">4096</option>
              </select>
            </div>
            <div>
              <label
                class="block font-semibold text-gray-700 mb-1 text-sm"
                data-i18n="textToPngHeight"
                >Height</label
              >
              <select
                id="canvasHeight"
                class="w-full p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm"
              >
                <option value="64">64</option>
                <option value="128">128</option>
                <option value="256">256</option>
                <option value="512">512</option>
                <option value="1024" selected>1024</option>
                <option value="2048">2048</option>
                <option value="4096">4096</option>
              </select>
            </div>
          </div>

          <!-- Margins -->
          <div>
            <label
              class="block font-semibold text-gray-700 mb-1 text-sm"
              data-i18n="textToPngMargins"
              >Margins (%)</label
            >
            <div class="grid grid-cols-4 gap-2">
              <div>
                <label
                  class="block text-xs text-gray-500 mb-0.5"
                  data-i18n="textToPngMarginTop"
                  >Top</label
                >
                <input
                  id="marginTop"
                  type="number"
                  value="1"
                  min="0"
                  max="50"
                  step="0.5"
                  class="w-full p-1.5 border border-gray-300 rounded text-sm focus:border-blue-500 outline-none"
                />
              </div>
              <div>
                <label
                  class="block text-xs text-gray-500 mb-0.5"
                  data-i18n="textToPngMarginBottom"
                  >Bottom</label
                >
                <input
                  id="marginBottom"
                  type="number"
                  value="1"
                  min="0"
                  max="50"
                  step="0.5"
                  class="w-full p-1.5 border border-gray-300 rounded text-sm focus:border-blue-500 outline-none"
                />
              </div>
              <div>
                <label
                  class="block text-xs text-gray-500 mb-0.5"
                  data-i18n="textToPngMarginLeft"
                  >Left</label
                >
                <input
                  id="marginLeft"
                  type="number"
                  value="1"
                  min="0"
                  max="50"
                  step="0.5"
                  class="w-full p-1.5 border border-gray-300 rounded text-sm focus:border-blue-500 outline-none"
                />
              </div>
              <div>
                <label
                  class="block text-xs text-gray-500 mb-0.5"
                  data-i18n="textToPngMarginRight"
                  >Right</label
                >
                <input
                  id="marginRight"
                  type="number"
                  value="1"
                  min="0"
                  max="50"
                  step="0.5"
                  class="w-full p-1.5 border border-gray-300 rounded text-sm focus:border-blue-500 outline-none"
                />
              </div>
            </div>
          </div>

          <!-- Filename -->
          <div>
            <label
              class="block font-semibold text-gray-700 mb-1 text-sm"
              data-i18n="textToPngFilename"
              >Filename</label
            >
            <input
              id="filename"
              type="text"
              value="text_transparent.png"
              class="w-full p-2 border border-gray-300 rounded-md focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm"
            />
          </div>

          <!-- Text lines editor -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label
                class="font-semibold text-gray-700 text-sm"
                data-i18n="textToPngLines"
                >Text Lines</label
              >
              <button
                id="addLineBtn"
                class="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600"
                data-i18n="textToPngAddLine"
              >
                + Add Line
              </button>
            </div>
            <div id="linesContainer" class="space-y-3"></div>
          </div>

          <!-- Download button -->
          <div class="flex justify-center pt-2">
            <button
              id="downloadBtn"
              class="px-6 py-3 bg-green-500 text-white rounded-md hover:bg-green-600 transform hover:-translate-y-0.5 transition-all font-semibold"
              data-i18n="textToPngDownload"
            >
              Download PNG
            </button>
          </div>
        </div>

        <!-- Right panel: Preview -->
        <div class="bg-white rounded-lg shadow-md p-6">
          <label
            class="block font-semibold text-gray-700 mb-2 text-sm"
            data-i18n="textToPngPreview"
            >Preview</label
          >
          <div
            id="previewContainer"
            class="border border-gray-200 rounded-lg overflow-hidden"
            style="
              background: repeating-conic-gradient(
                  #e5e7eb 0% 25%,
                  transparent 0% 50%
                )
                50% / 20px 20px;
            "
          >
            <canvas id="previewCanvas"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./text-to-png.js"></script>
  </body>
</html>
