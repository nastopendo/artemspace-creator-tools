<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="imageRedactorTitle">Image Redactor</title>
    <link rel="stylesheet" href="../../style.css" />
  </head>
  <body class="bg-gray-100 text-gray-800 min-h-screen py-8 px-4">
    <header class="relative mb-6">
      <nav>
        <a
          href="/"
          data-link
          class="text-blue-600 hover:text-blue-800"
          data-i18n="backToTools"
          >← Back to Tools</a
        >
      </nav>
    </header>

    <div class="max-w-7xl mx-auto animate-fade-in">
      <h1
        class="text-3xl font-bold text-center text-gray-800 mb-8"
        data-i18n="imageRedactorTitle"
      >
        Image Redactor
      </h1>

      <!-- Upload section -->
      <div id="uploadSection">
        <div
          id="uploadArea"
          class="border-2 border-dashed border-gray-300 rounded-xl p-16 text-center bg-white cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors"
        >
          <div class="text-5xl mb-4">🔒</div>
          <p
            class="text-lg font-semibold text-gray-700 mb-2"
            data-i18n="imageRedactorDragDrop"
          >
            Drag &amp; Drop Image Here
          </p>
          <p class="text-gray-400 mb-4" data-i18n="imageRedactorOr">or</p>
          <button
            id="selectImageBtn"
            class="px-5 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors font-medium"
            data-i18n="imageRedactorSelectImage"
          >
            Select Image
          </button>
          <p
            class="text-xs text-gray-400 mt-4"
            data-i18n="imageRedactorSupportedFormats"
          >
            Supported formats: JPG, PNG, WebP
          </p>
          <input id="fileInput" type="file" accept="image/*" class="hidden" />
        </div>
      </div>

      <!-- Editor section (hidden until image loaded) -->
      <div id="editorSection" class="hidden">
        <div class="grid grid-cols-1 lg:grid-cols-[260px_1fr] gap-6">
          <!-- Controls panel -->
          <div class="bg-white rounded-lg shadow-md p-6 space-y-5 self-start">
            <!-- Mode selector -->
            <div>
              <label
                class="block font-semibold text-gray-700 mb-2 text-sm"
                data-i18n="imageRedactorMode"
                >Redaction Mode</label
              >
              <div class="grid grid-cols-2 gap-2">
                <button
                  class="mode-btn active-mode px-3 py-2 rounded-md border text-sm font-medium transition-colors"
                  data-mode="pixelate"
                  data-i18n="imageRedactorPixelate"
                >
                  Pixelate
                </button>
                <button
                  class="mode-btn px-3 py-2 rounded-md border text-sm font-medium transition-colors"
                  data-mode="blur"
                  data-i18n="imageRedactorBlur"
                >
                  Blur
                </button>
                <button
                  class="mode-btn px-3 py-2 rounded-md border text-sm font-medium transition-colors"
                  data-mode="black"
                  data-i18n="imageRedactorBlackBar"
                >
                  Black Bar
                </button>
                <button
                  class="mode-btn px-3 py-2 rounded-md border text-sm font-medium transition-colors"
                  data-mode="white"
                  data-i18n="imageRedactorWhiteBar"
                >
                  White Bar
                </button>
              </div>
            </div>

            <!-- Pixel size (pixelate mode) -->
            <div id="pixelSizeControl">
              <label
                class="block font-semibold text-gray-700 mb-1 text-sm"
                data-i18n="imageRedactorPixelSize"
                >Pixel Size</label
              >
              <div class="flex items-center gap-3">
                <input
                  id="pixelSizeSlider"
                  type="range"
                  min="5"
                  max="30"
                  value="10"
                  class="flex-1"
                />
                <span id="pixelSizeValue" class="text-sm font-medium text-gray-600 w-8 text-right">10</span>
              </div>
            </div>

            <!-- Blur radius (blur mode) -->
            <div id="blurRadiusControl" class="hidden">
              <label
                class="block font-semibold text-gray-700 mb-1 text-sm"
                data-i18n="imageRedactorBlurRadius"
                >Blur Radius</label
              >
              <div class="flex items-center gap-3">
                <input
                  id="blurRadiusSlider"
                  type="range"
                  min="3"
                  max="20"
                  value="6"
                  class="flex-1"
                />
                <span id="blurRadiusValue" class="text-sm font-medium text-gray-600 w-8 text-right">6</span>
              </div>
            </div>

            <p
              class="text-xs text-gray-400 bg-gray-50 rounded p-2"
              data-i18n="imageRedactorDragTip"
            >
              💡 Drag on the image to redact an area
            </p>

            <hr class="border-gray-200" />

            <!-- Undo / Clear -->
            <div class="grid grid-cols-2 gap-2">
              <button
                id="undoBtn"
                class="px-3 py-2 bg-gray-100 text-gray-700 rounded-md border border-gray-200 hover:bg-gray-200 transition-colors text-sm font-medium"
                data-i18n="imageRedactorUndo"
              >
                Undo
              </button>
              <button
                id="clearAllBtn"
                class="px-3 py-2 bg-gray-100 text-gray-700 rounded-md border border-gray-200 hover:bg-gray-200 transition-colors text-sm font-medium"
                data-i18n="imageRedactorClearAll"
              >
                Clear All
              </button>
            </div>

            <hr class="border-gray-200" />

            <!-- Download / Copy -->
            <div class="space-y-2">
              <button
                id="downloadBtn"
                class="w-full px-4 py-2.5 bg-green-500 text-white rounded-md hover:bg-green-600 transition-colors font-semibold text-sm"
                data-i18n="imageRedactorDownload"
              >
                Download PNG
              </button>
              <button
                id="copyBtn"
                class="w-full px-4 py-2.5 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors font-semibold text-sm"
                data-i18n="imageRedactorCopy"
              >
                Copy to Clipboard
              </button>
            </div>

            <button
              id="newImageBtn"
              class="w-full px-4 py-2 text-gray-500 border border-gray-200 rounded-md hover:bg-gray-50 transition-colors text-sm"
              data-i18n="imageRedactorNewImage"
            >
              New Image
            </button>
          </div>

          <!-- Canvas panel -->
          <div class="bg-white rounded-lg shadow-md p-4">
            <div
              id="canvasWrapper"
              class="overflow-auto rounded border border-gray-100 bg-gray-50"
              style="max-height: 80vh; cursor: crosshair;"
            >
              <canvas id="redactorCanvas" class="block max-w-full"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./image-redactor.js"></script>
  </body>
</html>
